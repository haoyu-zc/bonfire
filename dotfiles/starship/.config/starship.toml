# =============================================================================
# Starship prompt configuration
# https://starship.rs/config/
# =============================================================================

# Wait 10ms for starship to check files
scan_timeout = 10
command_timeout = 1500

# Don't add a newline at the start of the prompt
add_newline = true

# Use a custom format
format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$python\
$nodejs\
$rust\
$golang\
$docker_context\
$conda\
$cmd_duration\
$line_break\
$character"""

# =============================================================================
# Prompt character
# =============================================================================
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# =============================================================================
# Directory
# =============================================================================
[directory]
style = "bold cyan"
truncation_length = 0
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"~/_workspace/projects" = "~/projects"
"~/Documents" = "~/docs"

# =============================================================================
# Git
# =============================================================================
[git_branch]
symbol = " "
style = "bold purple"
format = "[$symbol$branch(:$remote_branch)]($style) "
truncation_length = 30

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
conflicted = "⚔️ "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "󰏗 "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

# =============================================================================
# Languages / runtimes (only show when in relevant projects)
# =============================================================================
[python]
symbol = " "
style = "yellow bold"
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile", "setup.py"]

[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol($version )]($style)"
detect_files = ["package.json", ".nvmrc", ".node-version"]

[rust]
symbol = " "
style = "bold red"
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
style = "bold cyan"
format = "[$symbol($version )]($style)"

# =============================================================================
# Command duration
# =============================================================================
[cmd_duration]
min_time = 2_000       # Show after 2 seconds
format = "took [$duration](bold yellow) "
show_notifications = false

# =============================================================================
# Username / hostname (only in SSH or root)
# =============================================================================
[username]
style_user = "bold blue"
style_root = "bold red"
format = "[$user]($style)@"
show_always = false

[hostname]
ssh_only = true
style = "bold green"
format = "[$hostname]($style) "

# =============================================================================
# Docker context
# =============================================================================
[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style = "blue bold"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# =============================================================================
# Disabled modules
# =============================================================================
# =============================================================================
# Conda
# =============================================================================
[conda]
symbol = "🅒 "
format = "[$symbol$environment]($style) "
style = "bold green"
ignore_base = false

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true
