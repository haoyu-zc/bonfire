# =============================================================================
# mise global configuration
# https://mise.jdx.dev/
# Manages dev tool versions across all projects.
# =============================================================================

[tools]
# Language runtimes
node = "lts"
python = "3.12"

# CLI tools via github backend (pulls prebuilt binaries from GitHub releases)
"github:junegunn/fzf"          = "latest"   # fuzzy finder
"github:ajeetdsouza/zoxide"    = "latest"   # smarter cd
"github:BurntSushi/ripgrep[exe=rg]" = "latest"  # fast grep (binary named rg inside archive)
"github:sharkdp/bat"           = "latest"   # cat with syntax highlighting
"github:sharkdp/fd"            = "latest"   # fast find
"github:eza-community/eza"     = "latest"   # modern ls
"github:dandavison/delta"      = "latest"   # better git diff
"github:jesseduffield/lazygit" = "latest"   # terminal git UI
"github:starship/starship"     = "latest"   # cross-shell prompt
# tealdeer: installed via apt/brew (recent GitHub releases don't ship Linux binaries)
"github:jqlang/jq"             = "latest"   # JSON processor
"github:mikefarah/yq"          = "latest"   # YAML processor
"github:astral-sh/uv"          = "latest"   # fast Python package manager
"github:astral-sh/ruff"        = "latest"   # fast Python linter + formatter

[settings]
# Always use the latest compatible version for each tool
experimental = true
